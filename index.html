<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Order & Reserve</title>
    <style>
        :root {
            --primary: #d4a373;
            --dark: #1a1a1a;
            --light: #fefae0;
            --white: #ffffff;
            --text: #333;
            --accent: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 5rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Category Filter */
        .filter-container { text-align: center; margin-bottom: 40px; }
        .filter-btn {
            background: var(--white);
            border: 2px solid var(--primary);
            padding: 10px 25px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .filter-btn.active { background: var(--primary); color: white; }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .menu-item {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .menu-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .menu-image { width: 100%; height: 220px; object-fit: cover; background: #eee; }
        .menu-content { padding: 1.5rem; flex-grow: 1; }
        
        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }

        /* Booking Form */
        h2 { text-align: center; margin-top: 3rem; }
        .reservation-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .selected-items-list {
            background: #fdfdfd;
            padding: 1.2rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 2px dashed var(--primary);
        }

        /* Total Price Styling */
        .total-box {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .full-width { grid-column: span 2; }
        input, select, textarea {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 5px; }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #bc8a5f; }

        footer {
            background: var(--dark);
            color: #999;
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 5rem;
        }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>THE GOLDEN FORK</h1>
    <p>Premium Dining & Refreshments</p>
</header>

<div class="container">
    
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterMenu('All', this)">All</button>
        <button class="filter-btn" onclick="filterMenu('Food', this)">Food</button>
        <button class="filter-btn" onclick="filterMenu('Drink', this)">Drinks</button>
    </div>

    <div class="menu-grid" id="menu-list">
        </div>

    <h2>Confirm Your Reservation</h2>
    <div class="reservation-box">
        
        <div id="order-summary" class="selected-items-list">
            <strong>Selected from Menu:</strong> <span id="items-count">None yet</span>
            <ul id="selected-list" style="margin-top: 10px; padding-left: 20px; color: #555;"></ul>
            
            <div class="total-box">
                <span>Estimated Total:</span>
                <span id="total-price" style="color: var(--accent)">$0.00</span>
            </div>
        </div>

        <form action="https://formspree.io/f/xojpndea" method="POST">
            <input type="hidden" name="ordered_items" id="hidden-items-input">
            <input type="hidden" name="total_price_confirmed" id="hidden-total-input">

            <div class="form-grid">
                <div>
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div>
                    <label>Reservation Date</label>
                    <input type="date" name="date" id="res-date" required>
                </div>

                <div>
                    <label>Arrival Time</label>
                    <select name="time" required>
                        <option value="">Select Time</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="1:00 PM">01:00 PM</option>
                        <option value="6:00 PM">06:00 PM</option>
                        <option value="8:00 PM">08:00 PM</option>
                    </select>
                </div>

                <div class="full-width">
                    <label>Select Table</label>
                    <select name="table" required>
                        <option value="">Choose a table location...</option>
                        <optgroup label="Indoor (Air Conditioned)">
                            <option value="T1">Table 01 - Window Seat</option>
                            <option value="T2">Table 02 - Near Bar</option>
                            <option value="T3">Table 03 - Family Round</option>
                        </optgroup>
                        <optgroup label="Outdoor (Garden)">
                            <option value="T4">Table 04 - Terrace View</option>
                            <option value="T5">Table 05 - Near Fountain</option>
                        </optgroup>
                        <optgroup label="VIP Room">
                            <option value="VIP-A">Private Room A</option>
                        </optgroup>
                    </select>
                </div>

                <textarea name="notes" placeholder="Special requests (e.g., Birthday, Allergies)..." class="full-width" rows="3"></textarea>
                
                <button type="submit" class="submit-btn full-width">Place Order & Reserve</button>
            </div>
        </form>
    </div>
</div>

<footer>
    <p><strong>The Golden Fork</strong><br>123 Street, Phnom Penh</p>
    <p>&copy; 2026 Developed by Richard Sovann</p>
</footer>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxbtpBebao6Vex9tqtX4P087UlW6tt_jRNEhokN7vZBMS-jQDEi806T18NhmHOaWZ6jD0ZpIaDW42q/pub?output=csv';
    let allItems = [];
    let selectedItems = [];

    // Set minimum date to today
    const dateInput = document.getElementById('res-date');
    dateInput.min = new Date().toISOString().split('T')[0];

    async function loadData() {
        try {
            const resp = await fetch(sheetUrl);
            const text = await resp.text();
            const rows = text.split('\n').slice(1);
            allItems = rows.map(r => {
                const c = r.split(',');
                return { name: c[0], price: c[1], desc: c[2], img: c[3], cat: c[4]?.trim() || 'Food' };
            }).filter(i => i.name);
            filterMenu('All');
        } catch(e) {
            console.error("Data load failed", e);
        }
    }

    function filterMenu(cat, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const filtered = cat === 'All' ? allItems : allItems.filter(i => i.cat.toLowerCase() === cat.toLowerCase());
        document.getElementById('menu-list').innerHTML = filtered.map(i => `
            <div class="menu-item">
                <img src="${i.img}" class="menu-image" alt="${i.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Food'">
                <div class="menu-content">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="font-size:1.1rem">${i.name}</strong>
                        <span style="color:var(--primary); font-weight:bold">${i.price}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#666; margin:10px 0;">${i.desc}</p>
                    <button class="add-btn" onclick="addToOrder('${i.name}', '${i.price}')">+ Add to My Booking</button>
                </div>
            </div>
        `).join('');
    }

    // UPDATED FUNCTION: Now tracks price too!
    function addToOrder(name, priceStr) {
        // Remove $ sign and convert to number
        const priceNum = parseFloat(priceStr.replace('$', '')) || 0;
        selectedItems.push({ name: name, price: priceNum });
        updateUI();
    }

    function removeItem(idx) {
        selectedItems.splice(idx, 1);
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('selected-list');
        const count = document.getElementById('items-count');
        const totalDisp = document.getElementById('total-price');
        const hiddenItems = document.getElementById('hidden-items-input');
        const hiddenTotal = document.getElementById('hidden-total-input');

        let runningTotal = 0;

        if(selectedItems.length > 0) {
            count.innerText = `(${selectedItems.length} items)`;
            
            list.innerHTML = selectedItems.map((item, i) => {
                runningTotal += item.price;
                return `
                    <li style="margin-bottom:5px; display:flex; justify-content:space-between">
                        <span>${item.name} ($${item.price.toFixed(2)})</span>
                        <button onclick="removeItem(${i})" style="color:red; border:none; background:none; cursor:pointer; font-size:0.8rem">[Remove]</button>
                    </li>
                `;
            }).join('');

            totalDisp.innerText = `$${runningTotal.toFixed(2)}`;
            
            // Prepare data for Formspree email
            hiddenItems.value = selectedItems.map(i => i.name).join(', ');
            hiddenTotal.value = `$${runningTotal.toFixed(2)}`;

        } else {
            count.innerText = "None yet";
            list.innerHTML = "";
            totalDisp.innerText = "$0.00";
            hiddenItems.value = "";
            hiddenTotal.value = "$0.00";
        }
    }

    loadData();
</script>
</body>
</html>
