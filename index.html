<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Live Menu & Reservations</title>
    <style>
        :root {
            --primary: #d4a373;
            --dark: #1a1a1a;
            --light: #fefae0;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 5rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--primary);
            margin: 10px auto;
        }

        /* Filter Buttons Styling */
        .filter-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: var(--white);
            color: var(--dark);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        .menu-item {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.4s;
        }

        .menu-item:hover { transform: translateY(-10px); }

        .menu-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .menu-content { padding: 1.8rem; }

        .menu-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .price { color: var(--primary); }

        /* Reservation Section */
        .reservation-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 10px 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .full-width { grid-column: span 2; }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #bc8a5f; }

        footer {
            background: var(--dark);
            color: #bbb;
            text-align: center;
            padding: 4rem 1rem;
            margin-top: 6rem;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE GOLDEN FORK</h1>
        <p>Premium Drinks & Dining Experience</p>
    </header>

    <div class="container">
        
        <h2>Our Menu</h2>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterMenu('All', this)">All</button>
            <button class="filter-btn" onclick="filterMenu('Food', this)">Food</button>
            <button class="filter-btn" onclick="filterMenu('Drink', this)">Drink</button>
        </div>

        <div class="menu-grid" id="menu-list">
            </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 4rem 0;">

        <h2>Book Your Table</h2>
        <div class="reservation-box">
            <form action="https://formspree.io/f/xojpndea" method="POST">
                <div class="form-grid">
                    <input type="text" name="customer_name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>

                    <select name="table_number" required>
                        <option value="">Select Table Number</option>
                        <option value="T1">Table 01 - Window View</option>
                        <option value="T2">Table 02 - Cozy Corner</option>
                        <option value="T3">Table 03 - Garden Terrace</option>
                        <option value="T4">Table 04 - VIP Lounge</option>
                    </select>

                    <select name="reservation_time" required>
                        <option value="">Select Time Slot</option>
                        <option value="11:00 AM">11:00 AM (Brunch)</option>
                        <option value="2:00 PM">02:00 PM (Lunch)</option>
                        <option value="6:00 PM">06:00 PM (Dinner)</option>
                        <option value="8:00 PM">08:00 PM (Late Night)</option>
                    </select>

                    <div class="full-width">
                        <p style="margin-bottom: 5px; font-weight: bold;">I am interested in:</p>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" name="interest[]" value="Food"> Food
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="interest[]" value="Drink"> Drink
                            </label>
                        </div>
                    </div>

                    <textarea name="notes" placeholder="Special Requests or Allergies..." class="full-width" rows="3"></textarea>
                    
                    <button type="submit" class="submit-btn full-width">Confirm Reservation</button>
                </div>
            </form>
        </div>

    </div>

    <footer>
        <p><strong>The Golden Fork</strong></p>
        <p>Crafted by Virakreach &copy; 2026</p>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxbtpBebao6Vex9tqtX4P087UlW6tt_jRNEhokN7vZBMS-jQDEi806T18NhmHOaWZ6jD0ZpIaDW42q/pub?output=csv';
        let allItems = [];

        async function fetchMenu() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1);
                
                allItems = rows.map(row => {
                    const columns = row.split(',');
                    if (columns.length < 4) return null;
                    return {
                        name: columns[0].trim(),
                        price: columns[1].trim(),
                        description: columns[2].trim(),
                        image: columns[3].trim(),
                        category: columns[4] ? columns[4].trim() : 'Food'
                    };
                }).filter(item => item !== null);

                filterMenu('All');
            } catch (err) {
                console.error(err);
            }
        }

        function filterMenu(category, btn) {
            const list = document.getElementById('menu-list');
            if (btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            const filtered = category === 'All' 
                ? allItems 
                : allItems.filter(item => item.category.toLowerCase() === category.toLowerCase());

            list.innerHTML = filtered.map(item => `
                <div class="menu-item">
                    <img src="${item.image}" class="menu-image" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Menu+Item'">
                    <div class="menu-content">
                        <div class="menu-header">
                            <span>${item.name}</span>
                            <span class="price">${item.price}</span>
                        </div>
                        <p>${item.description}</p>
                    </div>
                </div>
            `).join('');
        }

        fetchMenu();
    </script>
</body>
</html>
