<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Live Menu & Reservations</title>
    <style>
        :root {
            --primary: #d4a373; /* Gold/Tan Theme */
            --dark: #1a1a1a;
            --light: #fefae0;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 5rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--primary);
            margin: 10px auto;
        }

        /* Filter Buttons Styling */
        .filter-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: var(--white);
            color: var(--dark);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        .menu-item {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.4s;
        }

        .menu-item:hover { transform: translateY(-10px); }

        .menu-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .menu-content { padding: 1.8rem; }

        .menu-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .price { color: var(--primary); }

        /* Reservation Section */
        .reservation-box {
            background: var(--white);
            padding: 3.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline-color: var(--primary);
        }

        .full-width { grid-column: span 2; }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #bc8a5f; }

        footer {
            background: var(--dark);
            color: #bbb;
            text-align: center;
            padding: 4rem 1rem;
            margin-top: 6rem;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            header { padding: 3rem 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE GOLDEN FORK</h1>
        <p>A Taste of Excellence, Updated Live</p>
    </header>

    <div class="container">
        
        <h2>Explore Our Menu</h2>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterMenu('All', this)">Full Menu</button>
            <button class="filter-btn" onclick="filterMenu('Food', this)">Delicious Food</button>
            <button class="filter-btn" onclick="filterMenu('Drink', this)">Refreshing Drinks</button>
        </div>

        <div class="menu-grid" id="menu-list">
            </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 4rem 0;">

        <h2>Reserve Your Table</h2>
        <div class="reservation-box">
            <form action="https://formspree.io/f/xojpndea" method="POST">
                <div class="form-grid">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="date" name="reservation_date" required>
                    <select name="guests" required>
                        <option value="">How many guests?</option>
                        <option value="1">1 Person</option>
                        <option value="2">2 People</option>
                        <option value="4">4 People</option>
                        <option value="6">6+ People</option>
                    </select>
                    <textarea name="requests" placeholder="Any special requests? (Birthdays, Allergies...)" class="full-width" rows="4"></textarea>
                    <button type="submit" class="submit-btn full-width">Confirm My Booking</button>
                </div>
            </form>
        </div>

    </div>

    <footer>
        <p><strong>The Golden Fork Restaurant</strong></p>
        <p>123 Gastronomy Lane, Culinary City<br>Open Daily: 11:00 AM - 10:00 PM</p>
        <p style="margin-top: 1.5rem; font-size: 0.8rem;">&copy; 2026 Crafted by Virakreach</p>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxbtpBebao6Vex9tqtX4P087UlW6tt_jRNEhokN7vZBMS-jQDEi806T18NhmHOaWZ6jD0ZpIaDW42q/pub?output=csv';
        let allItems = [];

        async function fetchMenu() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                
                // Process CSV rows
                const rows = csvData.split('\n').slice(1); // Skip Header Row
                
                allItems = rows.map(row => {
                    const columns = row.split(',');
                    if (columns.length < 4) return null; // Avoid empty rows

                    return {
                        name: columns[0].trim(),
                        price: columns[1].trim(),
                        description: columns[2].trim(),
                        image: columns[3].trim(),
                        category: columns[4] ? columns[4].trim() : 'Food' // Get Category from Column E
                    };
                }).filter(item => item !== null);

                filterMenu('All'); // Initial display
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('menu-list').innerHTML = "<p style='text-align:center;'>Unable to load menu. Please check connection.</p>";
            }
        }

        function filterMenu(category, btnElement) {
            const list = document.getElementById('menu-list');
            
            // Manage active button class
            if (btnElement) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                btnElement.classList.add('active');
            }

            const filteredData = category === 'All' 
                ? allItems 
                : allItems.filter(item => item.category.toLowerCase() === category.toLowerCase());

            list.innerHTML = filteredData.map(item => `
                <div class="menu-item">
                    <img src="${item.image}" class="menu-image" alt="${item.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Food+Image'">
                    <div class="menu-content">
                        <div class="menu-header">
                            <span>${item.name}</span>
                            <span class="price">${item.price}</span>
                        </div>
                        <p>${item.description}</p>
                    </div>
                </div>
            `).join('');
        }

        // Start loading the menu
        fetchMenu();
    </script>

</body>
</html>
