<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Live Menu</title>
    <style>
        :root {
            --primary: #d4a373;
            --dark: #1a1a1a;
            --light: #fefae0;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 4rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--primary);
            margin: 10px auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .menu-item {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .menu-item:hover { transform: translateY(-8px); }

        .menu-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #eee;
        }

        .menu-content { padding: 1.5rem; }

        .menu-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .price { color: var(--primary); }

        .reservation-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            margin-top: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .full-width { grid-column: span 2; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { background: #bc8a5f; }

        footer {
            background: var(--dark);
            color: #999;
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 5rem;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE GOLDEN FORK</h1>
        <p>Premium Culinary Experience</p>
    </header>

    <div class="container">
        
        <h2>Chef's Selection</h2>
        <div class="menu-grid" id="menu-list">
            </div>

        <h2>Book a Table</h2>
        <div class="reservation-box">
            <form action="https://formspree.io/f/xojpndea" method="POST">
                <div class="form-grid">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="date" name="date" required>
                    <select name="guests" required>
                        <option value="">Number of Guests</option>
                        <option value="1">1 Person</option>
                        <option value="2">2 People</option>
                        <option value="4">4 People</option>
                        <option value="6">6+ People</option>
                    </select>
                    <textarea name="message" placeholder="Special Requests" class="full-width" rows="4"></textarea>
                    <button type="submit" class="full-width">Confirm Reservation</button>
                </div>
            </form>
        </div>

    </div>

    <footer>
        <p>123 Gastronomy Lane, Foodie City<br>Open Daily: 11:00 AM - 10:00 PM</p>
        <p style="margin-top: 1rem;">&copy; 2026 The Golden Fork</p>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxbtpBebao6Vex9tqtX4P087UlW6tt_jRNEhokN7vZBMS-jQDEi806T18NhmHOaWZ6jD0ZpIaDW42q/pub?output=csv';

        async function loadMenu() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                
                // Split rows and skip the header
                const rows = data.split('\n').slice(1);
                const menuList = document.getElementById('menu-list');
                
                menuList.innerHTML = rows.map(row => {
                    // Split the columns
                    const columns = row.split(',');
                    if (columns.length < 4) return ''; // Skip empty rows

                    const name = columns[0].trim();
                    const price = columns[1].trim();
                    const desc = columns[2].trim();
                    const img = columns[3].trim();

                    return `
                        <div class="menu-item">
                            <img src="${img}" class="menu-image" alt="${name}" onerror="this.src='https://via.placeholder.com/300x200?text=Food+Image'">
                            <div class="menu-content">
                                <div class="menu-header">
                                    <span>${name}</span>
                                    <span class="price">${price}</span>
                                </div>
                                <p>${desc}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error loading menu:", error);
                document.getElementById('menu-list').innerHTML = "<p>Error loading menu. Please check the spreadsheet publication.</p>";
            }
        }

        loadMenu();
    </script>

</body>
</html>
