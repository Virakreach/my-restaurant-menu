<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Order & Reserve</title>
    <style>
        :root {
            --primary: #d4a373;
            --dark: #1a1a1a;
            --light: #fefae0;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 5rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .filter-container { text-align: center; margin-bottom: 40px; }

        .filter-btn {
            background: var(--white);
            border: 2px solid var(--primary);
            padding: 10px 20px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .filter-btn.active { background: var(--primary); color: white; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .menu-item {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .menu-image { width: 100%; height: 200px; object-fit: cover; }

        .menu-content { padding: 1.5rem; flex-grow: 1; }

        .add-btn {
            background: #2a9d8f;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        /* Booking Section */
        .reservation-box {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .selected-items-list {
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px dashed var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width { grid-column: span 2; }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>THE GOLDEN FORK</h1>
    <p>Select your Food & Drinks before you arrive!</p>
</header>

<div class="container">
    
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterMenu('All', this)">All</button>
        <button class="filter-btn" onclick="filterMenu('Food', this)">Food</button>
        <button class="filter-btn" onclick="filterMenu('Drink', this)">Drink</button>
    </div>

    <div class="menu-grid" id="menu-list"></div>

    <h2 style="text-align: center;">Your Reservation Details</h2>
    <div class="reservation-box">
        
        <div id="order-summary" class="selected-items-list">
            <strong>Selected Items:</strong> <span id="items-count">None yet</span>
            <ul id="selected-list" style="margin-top: 10px; padding-left: 20px;"></ul>
        </div>

        <form action="https://formspree.io/f/xojpndea" method="POST">
            <input type="hidden" name="ordered_items" id="hidden-items-input">

            <div class="form-grid">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email" required>
                
                <select name="table" required>
                    <option value="">Select Table</option>
                    <option value="1">Table 01 (Window)</option>
                    <option value="2">Table 02 (Inside)</option>
                </select>

                <select name="time" required>
                    <option value="">Select Time</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="6:00 PM">6:00 PM</option>
                </select>

                <textarea name="notes" placeholder="Special requests..." class="full-width" rows="3"></textarea>
                <button type="submit" class="submit-btn full-width">Confirm Booking</button>
            </div>
        </form>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxbtpBebao6Vex9tqtX4P087UlW6tt_jRNEhokN7vZBMS-jQDEi806T18NhmHOaWZ6jD0ZpIaDW42q/pub?output=csv';
    let allItems = [];
    let selectedItems = []; // Array to store user choices

    async function loadData() {
        const resp = await fetch(sheetUrl);
        const text = await resp.text();
        const rows = text.split('\n').slice(1);
        allItems = rows.map(r => {
            const c = r.split(',');
            return { name: c[0], price: c[1], desc: c[2], img: c[3], cat: c[4]?.trim() || 'Food' };
        }).filter(i => i.name);
        filterMenu('All');
    }

    function filterMenu(cat, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const filtered = cat === 'All' ? allItems : allItems.filter(i => i.cat === cat);
        document.getElementById('menu-list').innerHTML = filtered.map(i => `
            <div class="menu-item">
                <img src="${i.img}" class="menu-image">
                <div class="menu-content">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${i.name}</strong>
                        <span style="color:var(--primary)">${i.price}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#666">${i.desc}</p>
                    <button class="add-btn" onclick="addToOrder('${i.name}')">+ Add to Booking</button>
                </div>
            </div>
        `).join('');
    }

    function addToOrder(itemName) {
        selectedItems.push(itemName);
        updateOrderUI();
    }

    function updateOrderUI() {
        const list = document.getElementById('selected-list');
        const hiddenInput = document.getElementById('hidden-items-input');
        const countText = document.getElementById('items-count');

        if(selectedItems.length > 0) {
            countText.innerText = `(${selectedItems.length} items)`;
            list.innerHTML = selectedItems.map((item, index) => `
                <li>${item} <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">[x]</button></li>
            `).join('');
            // Join items into a string for the hidden input
            hiddenInput.value = selectedItems.join(', ');
        } else {
            countText.innerText = "None yet";
            list.innerHTML = "";
            hiddenInput.value = "";
        }
    }

    function removeItem(index) {
        selectedItems.splice(index, 1);
        updateOrderUI();
    }

    loadData();
</script>
</body>
</html>
